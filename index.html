<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador Contable - Obra vs Proceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-file-earmark-spreadsheet"></i> Analizador Contable
            </span>
            <span class="text-light small">Proyecto 40 - Obra Altamira</span>
        </div>
    </nav>

    <div class="container my-4">
        <!-- Sección de carga -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-cloud-upload"></i> Cargar Archivos TXT</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">📄 Archivo OBRA.txt</label>
                        <input type="file" class="form-control" id="fileObra" accept=".txt">
                        <small class="text-muted">Reporte de ejecución presupuestaria</small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">📄 Archivo PROCESO.txt</label>
                        <input type="file" class="form-control" id="fileProceso" accept=".txt">
                        <small class="text-muted">Libro mayor - Producto en Proceso</small>
                    </div>
                </div>
                <div class="mt-3 d-flex gap-2">
                    <button class="btn btn-success" id="btnAnalizar" disabled>
                        <i class="bi bi-gear"></i> Analizar Archivos
                    </button>
                    <button class="btn btn-outline-secondary" id="btnLimpiar">
                        <i class="bi bi-arrow-clockwise"></i> Limpiar
                    </button>
                </div>
            </div>
        </div>

        <!-- Resultados -->
        <div id="resultados" style="display:none;">
            <!-- Resumen general -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card text-bg-primary shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="card-title">Total OBRA</h6>
                            <h3 id="totalObra" class="mb-0">-</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-bg-info shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="card-title">Total PROCESO</h6>
                            <h3 id="totalProceso" class="mb-0">-</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm h-100" id="cardDiferencia">
                        <div class="card-body">
                            <h6 class="card-title">Diferencia</h6>
                            <h3 id="totalDiferencia" class="mb-0">-</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-bg-success shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="card-title">Requisiciones Cuadradas</h6>
                            <h3 id="totalCuadradas" class="mb-0">-</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <ul class="nav nav-tabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabResumen">
                        <i class="bi bi-bar-chart"></i> Resumen
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCuadradas">
                        <i class="bi bi-check-circle"></i> Coincidencias
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabDiferencias">
                        <i class="bi bi-exclamation-triangle"></i> Diferencias
                    </button>
                </li>
            </ul>

            <div class="tab-content border border-top-0 p-3 bg-white">
                <div class="tab-pane fade show active" id="tabResumen">
                    <div id="contenidoResumen"></div>
                </div>
                <div class="tab-pane fade" id="tabCuadradas">
                    <div id="contenidoCuadradas"></div>
                </div>
                <div class="tab-pane fade" id="tabDiferencias">
                    <div id="contenidoDiferencias"></div>
                </div>
            </div>

            <!-- Botones de exportación -->
            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-outline-success" id="btnExportarCSV">
                    <i class="bi bi-download"></i> Exportar CSV
                </button>
                <button class="btn btn-outline-danger" id="btnExportarJSON">
                    <i class="bi bi-filetype-json"></i> Exportar JSON
                </button>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-light text-center py-3 mt-5">
        <small>Analizador Contable v1.0 - Procesamiento 100% local en tu navegador</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
